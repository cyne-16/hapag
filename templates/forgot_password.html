<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Hapag</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        :root {
            --night:   #0D1B2A;
            --deep:    #112236;
            --panel:   #162d47;
            --border:  #1e3d5c;
            --gold:    #F5A623;
            --orange:  #FF6B35;
            --jade:    #2ECC71;
            --sky:     #38BDF8;
            --purple:  #A855F7;
            --cream:   #FFF8EE;
            --muted:   #8FAABB;
            --font-display: 'Fredoka One', cursive;
            --font-body:    'Nunito', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--night);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Background blobs ── */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse at 30% 40%, rgba(245,166,35,.08) 0%, rgba(46,204,113,.05) 50%, transparent 75%);
            border-radius: 60% 40% 55% 45% / 50% 55% 45% 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: blobMorph 8s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(56,189,248,.06) 0%, transparent 70%);
            border-radius: 40% 60% 45% 55% / 55% 40% 60% 45%;
            top: 45%;
            left: 48%;
            transform: translate(-50%, -50%);
            animation: blobMorph 12s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes blobMorph {
            0%, 100% { border-radius: 60% 40% 55% 45% / 50% 55% 45% 50%; }
            33%       { border-radius: 45% 55% 40% 60% / 60% 45% 55% 40%; }
            66%       { border-radius: 55% 45% 60% 40% / 40% 60% 45% 55%; }
        }

        /* ── Floating orbs ── */
        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle, rgba(245,166,35,.12), transparent 70%);
        }

        .orb-1 { width: 80px; height: 80px; top: 10%; right: 15%; animation: orbFloat 7s ease-in-out infinite; }
        .orb-2 { width: 60px; height: 60px; bottom: 15%; left: 12%; animation: orbFloat 9s ease-in-out infinite reverse; background: radial-gradient(circle, rgba(46,204,113,.10), transparent 70%); }
        .orb-3 { width: 40px; height: 40px; top: 60%; right: 10%; animation: orbFloat 6s ease-in-out infinite; background: radial-gradient(circle, rgba(168,85,247,.12), transparent 70%); }

        @keyframes orbFloat {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }

        /* ── Auth Container ── */
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: var(--deep);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2.2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.5s ease-out;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--orange));
            border-radius: 20px 20px 0 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Logo ── */
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .auth-logo img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(245,166,35,.4));
        }

        .auth-logo h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(245,166,35,.3);
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--cream);
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .auth-subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .auth-subtitle i {
            color: var(--gold);
            margin-right: 0.3rem;
        }

        /* ── Alert ── */
        .alert {
            border-radius: 10px;
            padding: .7rem 1rem;
            font-size: .82rem;
            font-weight: 700;
            margin-bottom: 1rem;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .alert.error, .alert.danger {
            background: rgba(255,107,53,.12);
            border-color: rgba(255,107,53,.35);
            color: var(--orange);
        }
        .alert.success {
            background: rgba(46,204,113,.1);
            border-color: rgba(46,204,113,.3);
            color: var(--jade);
        }
        .alert.info {
            background: rgba(56,189,248,.1);
            border-color: rgba(56,189,248,.3);
            color: var(--sky);
        }

        /* ── Form ── */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .input-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.95rem;
            pointer-events: none;
        }

        form input {
            width: 100%;
            padding: 0.75rem 0.9rem 0.75rem 2.8rem;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--cream);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        form input::placeholder {
            color: var(--muted);
            font-weight: 600;
        }

        form input:focus {
            border-color: var(--sky);
            box-shadow: 0 0 0 3px rgba(56,189,248,.15);
        }

        form button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--night);
            border: none;
            border-radius: 10px;
            font-family: var(--font-display);
            font-size: 1.05rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
            box-shadow: 0 4px 20px rgba(245,166,35,.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(245,166,35,.45);
            filter: brightness(1.08);
        }

        form button:active {
            transform: translateY(0);
        }

        /* ── Footer links ── */
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .auth-footer p {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 600;
        }

        .auth-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 800;
            transition: color 0.18s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .auth-footer a:hover {
            color: var(--orange);
        }

        .auth-footer .divider {
            color: var(--border);
            padding: 0 0.3rem;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
                overflow-y: auto;
            }

            .auth-container {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }

            .auth-logo h1 {
                font-size: 1.5rem;
            }

            .auth-logo img {
                width: 36px;
                height: 36px;
            }

            .auth-title {
                font-size: 1.2rem;
            }

            .auth-subtitle {
                font-size: 0.8rem;
            }

            form input {
                padding: 0.65rem 0.8rem 0.65rem 2.4rem;
                font-size: 0.85rem;
            }

            form button {
                padding: 0.7rem;
                font-size: 0.95rem;
            }

            .orb {
                display: none;
            }

            body::before,
            body::after {
                display: none;
            }
        }

        @media (max-width: 360px) {
            .auth-container {
                padding: 1.5rem 1rem;
            }

            .auth-logo h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- ── Auth Container ── -->
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='images/icon.png') }}" alt="Hapag">
            <h1>Hapag</h1>
        </div>

        <h2 class="auth-title">🔑 Forgot Password</h2>
        <p class="auth-subtitle">
            <i class="fas fa-info-circle"></i>
            Enter your registered email to reset your password.
        </p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">
                    <i class="fas {% if category == 'success' %}fa-check-circle{% elif category == 'error' or category == 'danger' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        <!-- Form -->
        <form method="POST">
            <div class="input-wrap">
                <span class="input-icon"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <button type="submit">
                <i class="fas fa-paper-plane"></i> Verify Email
            </button>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
            <p>
                <a href="{{ url_for('login') }}">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </p>
        </div>
    </div>

</body>
</html>
