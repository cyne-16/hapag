<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User - Hapag</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">🍽️ Hapag Admin</div>
        <div class="nav-links">
            <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('admin_users') }}">Users</a>
            <a href="{{ url_for('admin_recipes') }}">Recipes</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <div class="main-container">
        <h2>✏️ Edit User</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <div class="form-card" style="max-width: 500px; margin-top: 24px;">
            <form method="POST">

                <label>Username</label>
                <input type="text" name="username" value="{{ user.username }}" required>

                <label>Email</label>
                <input type="email" name="email" value="{{ user.email }}" required>

                <label>Points</label>
                <input type="number" name="points" id="pointsInput" value="{{ user.points }}" oninput="updateLevel()">
                <label>Level (auto-calculated from points)</label>
                <select name="level" id="levelSelect" disabled style="background:#f5f5f5; color:#888;">
                    <option value="Beginner Cook">Beginner Cook</option>
                    <option value="Home Cook">Home Cook</option>
                    <option value="Skilled Cook">Skilled Cook</option>
                    <option value="Master Chef">Master Chef</option>
                </select>

                <label style="display:flex; align-items:center; gap:8px; margin-bottom:16px; font-weight:normal;">
                    <input type="checkbox" name="is_admin" style="width:auto;"
                           {% if user.is_admin %}checked{% endif %}>
                    Grant Admin Privileges
                </label>

                <button type="submit">💾 Save Changes</button>
                <a href="{{ url_for('admin_users') }}" class="btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
<script>
    function updateLevel() {
        const points = parseInt(document.getElementById('pointsInput').value) || 0;
        const levelSelect = document.getElementById('levelSelect');

        let level;
        if (points >= 600) {
            level = "Master Chef";
        } else if (points >= 300) {
            level = "Skilled Cook";
        } else if (points >= 100) {
            level = "Home Cook";
        } else {
            level = "Beginner Cook";
        }

        levelSelect.value = level;
    }

    // Run once on page load to set the correct initial value
    document.addEventListener('DOMContentLoaded', updateLevel);
</script>
</body>
</html>
