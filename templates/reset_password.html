<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Hapag</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --night:   #0D1B2A;
            --deep:    #112236;
            --panel:   #162d47;
            --border:  #1e3d5c;
            --gold:    #F5A623;
            --orange:  #FF6B35;
            --jade:    #2ECC71;
            --sky:     #38BDF8;
            --cream:   #FFF8EE;
            --muted:   #8FAABB;
            --font-display: 'Fredoka One', cursive;
            --font-body:    'Nunito', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--night);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ambient glow */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 25% 50%, rgba(56,189,248,.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 75% 50%, rgba(168,85,247,.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* floating food emojis */
        .floaties { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

        .floaties span {
            position: absolute; font-size: 1.6rem;
            opacity: .1; animation: floatUp linear infinite;
            filter: blur(.5px);
        }

        .floaties span:nth-child(1) { left:  7%; animation-duration: 14s; animation-delay:  0s; }
        .floaties span:nth-child(2) { left: 18%; animation-duration: 18s; animation-delay: -5s; }
        .floaties span:nth-child(3) { left: 32%; animation-duration: 12s; animation-delay: -9s; }
        .floaties span:nth-child(4) { left: 50%; animation-duration: 20s; animation-delay: -3s; }
        .floaties span:nth-child(5) { left: 65%; animation-duration: 15s; animation-delay: -7s; }
        .floaties span:nth-child(6) { left: 80%; animation-duration: 17s; animation-delay: -2s; }
        .floaties span:nth-child(7) { left: 91%; animation-duration: 13s; animation-delay: -10s; }

        @keyframes floatUp {
            0%   { transform: translateY(110vh) rotate(0deg);  opacity: 0; }
            10%  { opacity: .1; }
            90%  { opacity: .1; }
            100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
        }

        /* ── AUTH CARD ── */
        .auth-container {
            position: relative; z-index: 10;
            background: var(--deep);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2.2rem 2rem;
            width: 100%; max-width: 380px;
            box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(56,189,248,.06);
        }

        /* sky→purple top accent — distinct from login (gold) and register (jade) */
        .auth-container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: 20px 20px 0 0;
            background: linear-gradient(90deg, var(--sky), var(--purple));
        }

        /* ── LOGO ── */
        .auth-logo { text-align: center; margin-bottom: 1.6rem; }

        .auth-logo .logo-img {
            width: 72px; height: 72px; object-fit: contain;
            display: block; margin: 0 auto .4rem;
            filter: drop-shadow(0 0 16px rgba(56,189,248,.4));
            animation: iconBob 3s ease-in-out infinite;
        }

        @keyframes iconBob {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }

        .auth-logo h1 {
            font-family: var(--font-display);
            font-size: 2rem; color: var(--gold);
            letter-spacing: .04em;
            text-shadow: 0 0 24px rgba(245,166,35,.4);
            line-height: 1;
        }

        .auth-logo .tagline {
            font-size: .72rem; font-weight: 700;
            color: var(--muted); letter-spacing: .12em;
            text-transform: uppercase; margin-top: .3rem;
        }

        /* ── HEADING ── */
        .auth-container h2 {
            font-family: var(--font-display);
            font-size: 1.25rem; color: var(--cream);
            text-align: center; margin-bottom: .5rem;
        }

        .auth-subtitle {
            font-size: .78rem; font-weight: 600;
            color: var(--muted); text-align: center;
            margin-bottom: 1.4rem; line-height: 1.5;
        }

        /* ── FLASH ── */
        .alert {
            border-radius: 8px; padding: .6rem .9rem;
            font-size: .8rem; font-weight: 700;
            margin-bottom: 1rem; border: 1px solid transparent;
        }
        .alert.error,.alert.danger { background:rgba(255,107,53,.12); border-color:rgba(255,107,53,.35); color:var(--orange); }
        .alert.success { background:rgba(46,204,113,.1); border-color:rgba(46,204,113,.3); color:var(--jade); }
        .alert.info    { background:rgba(56,189,248,.1); border-color:rgba(56,189,248,.3); color:var(--sky); }

        /* ── FORM ── */
        form { display: flex; flex-direction: column; gap: .9rem; }

        .field-group { display: flex; flex-direction: column; gap: .35rem; }

        .field-label {
            font-size: .7rem; font-weight: 800;
            letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
        }

        .field-wrap { position: relative; }

        .field-icon {
            position: absolute; left: .9rem; top: 50%;
            transform: translateY(-50%);
            font-size: .9rem; pointer-events: none;
        }

        .pw-toggle {
            position: absolute; right: .7rem; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: .95rem; color: var(--muted); padding: .2rem;
            transition: color .2s;
        }

        .pw-toggle:hover { color: var(--cream); }

        form input[type="password"],
        form input[type="text"] {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .78rem .9rem .78rem 2.6rem;
            padding-right: 2.6rem;
            color: var(--cream);
            font-family: var(--font-body);
            font-size: .9rem; font-weight: 600;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        form input:focus {
            border-color: var(--sky);
            box-shadow: 0 0 0 3px rgba(56,189,248,.15);
        }

        form input::placeholder { color: var(--muted); }

        /* strength bar */
        .strength-wrap { display: none; }

        .strength-track {
            background: var(--border); border-radius: 99px;
            height: 6px; overflow: hidden;
        }

        .strength-fill {
            height: 100%; border-radius: 99px; width: 0%;
            transition: width .3s, background .3s;
        }

        .strength-text {
            font-size: .7rem; font-weight: 700;
            color: var(--muted); margin-top: .3rem;
        }

        /* match text */
        .match-text {
            font-size: .72rem; font-weight: 700; min-height: 1rem;
        }

        /* submit */
        form button[type="submit"] {
            margin-top: .2rem;
            background: linear-gradient(135deg, var(--sky), #0ea5e9);
            color: var(--night); border: none; border-radius: 10px;
            padding: .85rem;
            font-family: var(--font-display); font-size: 1.05rem;
            letter-spacing: .04em; cursor: pointer;
            transition: transform .18s, box-shadow .18s, filter .18s;
            box-shadow: 0 4px 18px rgba(56,189,248,.3);
        }

        form button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(56,189,248,.45);
            filter: brightness(1.08);
        }

        /* back link */
        .auth-footer {
            margin-top: 1.2rem; text-align: center;
        }

        .auth-footer a {
            font-size: .78rem; font-weight: 700;
            color: var(--muted); text-decoration: none;
            transition: color .18s;
        }

        .auth-footer a:hover { color: var(--cream); }

        @media (max-width: 420px) {
            .auth-container { margin: 1rem; padding: 2rem 1.4rem 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="floaties" aria-hidden="true">
        <span>🔒</span><span>🍚</span><span>🔑</span>
        <span>🥘</span><span>🛡️</span><span>🍖</span><span>⭐</span>
    </div>

    <div class="auth-container">

        <div class="auth-logo">
            <img src="{{ url_for('static', filename='images/icon.png') }}"
                 alt="Hapag" class="logo-img">
            <h1>Hapag</h1>
            <p class="tagline">Luto · Laro · Panalo</p>
        </div>

        <h2>Set New Password</h2>
        <p class="auth-subtitle">Choose a strong password to secure your account.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">

            <!-- NEW PASSWORD -->
            <div class="field-group">
                <label class="field-label" for="password">New Password</label>
                <div class="field-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" name="password" id="password"
                           placeholder="At least 6 characters" required
                           oninput="checkStrength(this.value)">
                    <button type="button" class="pw-toggle"
                            onclick="togglePw('password', this)">👁️</button>
                </div>
                <div class="strength-wrap" id="strengthWrap">
                    <div class="strength-track">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <p class="strength-text" id="strengthText"></p>
                </div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="field-group">
                <label class="field-label" for="confirm_password">Confirm New Password</label>
                <div class="field-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" name="confirm_password" id="confirm_password"
                           placeholder="Re-enter new password" required
                           oninput="checkMatch()">
                    <button type="button" class="pw-toggle"
                            onclick="togglePw('confirm_password', this)">👁️</button>
                </div>
                <p class="match-text" id="matchText"></p>
            </div>

            <button type="submit">🔑 Reset Password</button>

        </form>

        <div class="auth-footer">
            <a href="{{ url_for('login') }}">← Back to Login</a>
        </div>

    </div>

    <script>
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁️' : '🙈';
        }

        function checkStrength(value) {
            const wrap = document.getElementById('strengthWrap');
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            wrap.style.display = 'block';

            let score = 0;
            if (value.length >= 6)           score++;
            if (value.length >= 10)          score++;
            if (/[A-Z]/.test(value))         score++;
            if (/[0-9]/.test(value))         score++;
            if (/[^A-Za-z0-9]/.test(value))  score++;

            const levels = [
                { label: 'Very Weak',   color: '#ef5350', width: '20%' },
                { label: 'Weak',        color: '#ff7043', width: '40%' },
                { label: 'Fair',        color: '#ffa726', width: '60%' },
                { label: 'Strong',      color: '#66bb6a', width: '80%' },
                { label: 'Very Strong', color: '#43a047', width: '100%' }
            ];

            const lv = levels[Math.min(score, 4)];
            fill.style.width      = lv.width;
            fill.style.background = lv.color;
            text.textContent      = `Strength: ${lv.label}`;
            text.style.color      = lv.color;
        }

        function checkMatch() {
            const pw      = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const text    = document.getElementById('matchText');
            if (!confirm) { text.textContent = ''; return; }
            if (pw === confirm) {
                text.textContent = '✅ Passwords match';
                text.style.color = '#43a047';
            } else {
                text.textContent = '❌ Passwords do not match';
                text.style.color = '#ef5350';
            }
        }
    </script>

</body>
</html>
