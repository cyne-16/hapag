<script>
    let notifOpen = false;

    function fetchNotifications() {
        fetch('/notifications')
            .then(r => r.json())
            .then(data => {
                const count = data.count;
                const badge = document.getElementById('notifCount');
                const list = document.getElementById('notifList');

                if (count > 0) {
                    badge.style.display = 'flex';
                    badge.textContent = count > 9 ? '9+' : count;
                } else {
                    badge.style.display = 'none';
                }

                if (data.notifications.length === 0) {
                    list.innerHTML = '<p class="hapag-notif-empty">No new notifications</p>';
                } else {
                    list.innerHTML = data.notifications.map(n => `
                        <div class="notif-item" onclick="openNotif('${n.id}', '${n.link}')">
                            <p class="notif-message">${n.message}</p>
                            <span class="notif-time">${n.created_at}</span>
                        </div>
                    `).join('');
                }
            })
            .catch(err => console.log('Notification fetch error:', err));
    }

    function toggleNotifPanel() {
        const panel = document.getElementById('notifPanel');
        notifOpen = !notifOpen;
        panel.style.display = notifOpen ? 'block' : 'none';
        if (notifOpen) fetchNotifications();
    }

    function openNotif(id, link) {
        fetch(`/notifications/mark-one-read/${id}`, {method: 'POST'})
            .then(() => {
                if (link) window.location.href = link;
                else toggleNotifPanel();
            });
    }

    function markAllRead() {
        // Clear UI immediately (optimistic) so the button always feels responsive
        document.getElementById('notifCount').style.display = 'none';
        document.getElementById('notifList').innerHTML =
            '<p class="hapag-notif-empty">No new notifications</p>';
        notifOpen = false;
        document.getElementById('notifPanel').style.display = 'none';

        // Then sync with server (fire-and-forget — UI is already cleared)
        fetch('/notifications/mark-read', { method: 'POST' })
            .catch(err => console.log('Mark-read error:', err));
    }

    document.addEventListener('click', function(e) {
        const container = document.querySelector('.notif-bell-container');
        if (container && !container.contains(e.target) && notifOpen) {
            notifOpen = false;
            document.getElementById('notifPanel').style.display = 'none';
        }
    });

    fetchNotifications();
    setInterval(fetchNotifications, 15000);
</script>
